site_name: Zilliqa Developer Portal
site_url: https://dev.zilliqa.com/zilliqa2
docs_dir: !ENV DOC_SOURCE
site_description: Zilliqa blockchain
site_author: Zilliqa

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - js/versions.js
  - js/connect.js
  - js/chain.js
  - js/buffer.js

theme:
  name: material
  logo: assets/zilliqa.png
  font:
    text: Poppins
    code: Roboto Mono
  static_templates:
    - 404.html
    - 50x.html
  custom_dir: overrides/
  palette:
    scheme: zilliqa
  features:
    - content.code.annotate
    - navigation.indexes
    - navigation.footer

markdown_extensions:
  - attr_list
  - md_in_html
  - markdown.extensions.toc:
      slugify:
        !!python/object/apply:pymdownx.slugs.slugify { kwds: { case: lower } }
      permalink: ""
  - markdown.extensions.admonition:
  - markdown.extensions.smarty:
      smart_quotes: false
  - pymdownx.betterem:
  - markdown.extensions.attr_list:
  - markdown.extensions.def_list:
  - markdown.extensions.tables:
  - markdown.extensions.abbr:
  - markdown.extensions.footnotes:
  - markdown.extensions.md_in_html:
  - pymdownx.superfences:
      preserve_tabs: true
      custom_fences:
        # Mermaid diagrams
        - name: diagram
          class: diagram
          format: !!python/name:pymdownx.superfences.fence_code_format
        - name: math
          class: arithmatex
          format:
            !!python/object/apply:pymdownx.arithmatex.arithmatex_fenced_format {
              kwds: { mode: generic, tag: pre },
            }
  # TODO: See https://github.com/facelessuser/pymdown-extensions
  #        - name: md-render
  #          class: md-render
  #          format: !!python/name:tools.pymdownx_md_render.md_sub_render
  - pymdownx.highlight:
      extend_pygments_lang:
        - name: php-inline
          lang: php
          options:
            startinline: true
        - name: pycon3
          lang: pycon
          options:
            python3: true
      linenums_style: pymdownx-inline
  - pymdownx.inlinehilite:
      custom_inline:
        - name: math
          class: arithmatex
          format:
            !!python/object/apply:pymdownx.arithmatex.arithmatex_inline_format {
              kwds: { mode: generic },
            }
  - pymdownx.magiclink:
      repo_url_shortener: true
      repo_url_shorthand: true
      social_url_shorthand: true
      social_url_shortener: true
      user: facelessuser
      repo: pymdown-extensions
      normalize_issue_symbols: true
  - pymdownx.tilde:
  - pymdownx.caret:
  - pymdownx.smartsymbols:
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - pymdownx.escapeall:
      hardbreak: True
      nbsp: True
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.progressbar:
  - pymdownx.arithmatex:
      generic: true
      block_tag: "pre"
  - pymdownx.mark:
  - pymdownx.striphtml:
  - pymdownx.snippets:
      base_path:
        - docs/.snippets
        - LICENSE.md
      #      auto_append:
      #      - refs.md
      check_paths: true
  - pymdownx.keys:
      separator: "\uff0b"
  - pymdownx.details:
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.saneheaders:

extra:
  version: !ENV VERSION
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/zilliqa
    - icon: fontawesome/brands/discord
      link: https://discord.com/invite/XMRE9tt
    - icon: fontawesome/brands/telegram
      link: https://t.me/ZilliqaDevs
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/zilliqa
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/channel/UCvinnFbf0u71cajoxKcfZIQ
    - icon: octicons/server-16
      link: https://status.zilliqa.com

plugins:
  - search
  - markdownextradata: {}
